model:
  hidden_dim: 384
  n_layers: 6
  n_heads: 6
  seq_len: 256
  vocab_size: 50257
  mask_token_id: 50257
  dropout: 0.0
  weight_tying: true

noise:
  type: loglinear
  eps: 1.0e-3

training:
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 50000
  batch_size: 16
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  mixed_precision: "fp16"
  ema_decay: 0.9999
  log_every: 50
  save_every: 5000
  seed: 42

data:
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config: sample-10BT
  streaming: true
  shuffle_buffer: 10000
  num_workers: 2

sampling:
  steps: 256
  num_samples: 8

wandb:
  project: mdlm-pretrain
  enabled: false
